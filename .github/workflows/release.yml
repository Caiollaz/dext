name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Strip leading 'v' to get semver (v2.0.0 → 2.0.0)
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: DEXT ${{ steps.tag.outputs.tag }}
          body: |
            ## DEXT ${{ steps.tag.outputs.tag }}

            Local-first developer tools — 17 tools, 6 categories, all offline, zero backend.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (installer) | `.exe` |
            | Windows (MSI) | `.msi` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Linux (Debian/Ubuntu) | `.deb` |
            | Linux (AppImage) | `.AppImage` |
            | Linux (RPM) | `.rpm` |

            ### What's included

            **Encode/Decode** — Base64, URL Encoder, JWT Decoder, cURL Converter

            **JSON** — JSON Formatter, JSON Diff, JSON to TypeScript

            **Generators** — UUID Generator, Hash Generator, Secret Generator

            **Converters** — Timestamp Converter, Color Converter, Mock Generator

            **Text** — Regex Tester, Markdown Preview

            **DevOps** — HTTP Runner (desktop only), ENV Manager

            ---
            Built with Tauri v2 + React + TypeScript
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux (x64)
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sync version from tag into all config files BEFORE building
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Syncing version to: $VERSION"

          # Update package.json
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json && rm -f package.json.bak

          # Update src-tauri/tauri.conf.json
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak

          # Update src-tauri/Cargo.toml (only the package version, not dependency versions)
          sed -i.bak "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

          echo "--- package.json version ---"
          grep '"version"' package.json | head -1
          echo "--- tauri.conf.json version ---"
          grep '"version"' src-tauri/tauri.conf.json | head -1
          echo "--- Cargo.toml version ---"
          grep '^version' src-tauri/Cargo.toml | head -1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

  # Publish the release (remove draft status if needed)
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
